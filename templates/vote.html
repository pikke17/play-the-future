<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vota</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const radios = document.querySelectorAll('input[name="singer_id"]');
    const button = document.getElementById('vote-button');
    const form = document.getElementById('vote-form');

    // Abilita bottone alla selezione
    radios.forEach(radio => {
      radio.addEventListener("change", () => {
        button.disabled = false;

        // vibrazione breve
        if (navigator.vibrate) {
          navigator.vibrate(30);
        }
      });
    });

    // Feedback al submit
    form.addEventListener("submit", () => {
      button.disabled = true;
      button.textContent = "Invio in corso…";

      if (navigator.vibrate) {
        navigator.vibrate([20, 40, 20]);
      }
    });
  });
</script>

<body>

<div class="container">

    <div class="day-header">
            <span class="day-title">
            {% if day == 1 %}
                🎤 Play Together 05/06/2026
            {% elif day == 2 %}
                🎬 Videofestival 06/06/2026
            {% endif %}
            </span>
        </div>

    <h1>Scegli il cantante</h1>

    <p style="color: var(--muted); font-size:14px;">
        Puoi votare una sola volta.
    </p>

    <form method="post" action="/submit" id="vote-form">
        <input type="hidden" name="ticket_id" value="{{ ticket_id }}">

        {% for s in singers %}
        <label class="card selectable">
            
            <input
            type="radio"
            name="singer_id"
            value="{{ s[0] }}"
            required
            >

            <div class="card-content">
            <strong>{{ s[1] }} {{ s[2] }}</strong>

            <div class="song">
                {{ s[3] }} — <em>{{ s[4] }}</em>
            </div>
            </div>

        </label>
        {% endfor %}

        
        
    <button class="button" type="submit" disabled id="vote-button">
        Vota
    </button>

    </form>
</div>

</body>
</html>
