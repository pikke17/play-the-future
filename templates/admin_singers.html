<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Gestione Cantanti</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>

<body>

<div class="admin-container">

  <h1>Gestione Cantanti</h1>

  <!-- ========================= -->
  <!-- ➕ AGGIUNGI CANTANTE -->
  <!-- ========================= -->
  <div class="card">
    <h2>Aggiungi cantante</h2>

    <form method="post">

    <form method="post" class="form">

        <div class="form-group">
            <label>Nome artista / gruppo</label>
            <input name="firstName" required><br>
        </div>

        <div class="form-group">
            <label>Cognome / secondo nome</label>
            <input name="lastName" ><br>
        </div>

        <div class="form-group">
            <label>Canzone</label>
            <input name="songTitle" required><br>
        </div>

        <div class="form-group">
            <label>Autore</label>
            <input name="songAuthor" required><br>
        </div>

        <button class="button admin-button">
            Aggiungi cantante
        </button>

        </form>

    </form>
  </div>

  <!-- ========================= -->
  <!-- 📋 LISTA CANTANTI -->
  <!-- ========================= -->
  <div class="card">
    <h2>Lista cantanti</h2>

    {% for s in singers %}
      <div class="singer-row">

        <!-- INFO -->
        <div>
          <strong>{{ s[1] }} {{ s[2] }}</strong><br>
          <span class="song">
            {{ s[3] }} — <em>{{ s[4] }}</em>
          </span><br>
          <small>{{ s[5] }} voti</small>
        </div>

        <!-- AZIONI -->
        <div class="actions">

          {% if s[5] == 0 %}
            <a href="/admin/singers/edit/{{ s[0] }}">
              <button class="button admin-button">Modifica</button>
            </a>

            <a href="/admin/singers/delete/{{ s[0] }}">
              <button class="button admin-button" style="background:#dc2626;">
                Elimina
              </button>
            </a>
          {% else %}
            <small style="color:var(--muted);">
              🔒 Non modificabile (ha voti)
            </small>
          {% endif %}

        </div>

      </div>
    {% endfor %}

  </div>

  <!-- 🔙 TORNA ALLA DASHBOARD -->
  <div style="margin-top:20px;">
    <a href="/admin_dashboard">
      <button class="button admin-button">
        Torna alla dashboard
      </button>
    </a>
  </div>

</div>

</body>
</html>
