<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Modifica cantante</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>

<body>

<div class="admin-container">

  <h1>Modifica cantante</h1>

  <!-- ========================= -->
  <!-- ✏️ FORM MODIFICA -->
  <!-- ========================= -->
  <div class="card">

    <form method="post" class="form">

      <!-- NOME -->
      <div class="form-group">
        <label>Nome artista / gruppo</label>
        <input name="firstName"
               value="{{ singer[1] }}"
               required>
      </div>

      <!-- COGNOME -->
      <div class="form-group">
        <label>Cognome / secondo nome</label>
        <input name="lastName"
               value="{{ singer[2] }}">
      </div>

      <!-- CANZONE -->
      <div class="form-group">
        <label>Canzone</label>
        <input name="songTitle"
               value="{{ singer[3] }}"
               required>
      </div>

      <!-- AUTORE -->
      <div class="form-group">
        <label>Autore</label>
        <input name="songAuthor"
               value="{{ singer[4] }}"
               required>
      </div>

      <!-- SALVA -->
      <button class="button admin-button">
        Salva modifiche
      </button>

    </form>

  </div>

  <!-- ========================= -->
  <!-- 🔙 TORNA INDIETRO -->
  <!-- ========================= -->
  <div style="margin-top: 20px;">
    <a href="/admin/singers">
      <button class="button admin-button">
        Torna alla gestione cantanti
      </button>
    </a>
  </div>

</div>

</body>
</html>
